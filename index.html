<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>AI助手 - 流式输出+Markdown排版</title>
    <!-- 引入 marked.js 用于解析 Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fb;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
            position: relative;
        }

        /* API Key 设置栏 */
        .api-key-bar {
            padding: 8px 12px;
            background: #fff3e0;
            border-bottom: 1px solid #ffe0b5;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }
        .api-key-bar input {
            flex: 2;
            min-width: 120px;
            padding: 6px 10px;
            border: 1px solid #ffcc80;
            border-radius: 20px;
            font-size: 13px;
        }
        .api-key-bar button {
            background: #ff9800;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }
        .api-key-bar button.clear-key-btn {
            background: #dc3545;
        }
        .api-status {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 20px;
            white-space: nowrap;
        }

        /* 工具栏 */
        .toolbar {
            padding: 8px 12px;
            background: #f8f9fa;
            border-bottom: 1px solid #e5e5ea;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
        }
        .toolbar select {
            flex: 1;
            min-width: 100px;
            padding: 6px 8px;
            border-radius: 20px;
            border: 1px solid #ddd;
            background: white;
            font-size: 13px;
        }
        .toolbar button {
            background: transparent;
            border: none;
            font-size: 13px;
            color: #007aff;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 20px;
            white-space: nowrap;
        }
        .toolbar button:active {
            background: rgba(0, 122, 255, 0.1);
        }
        .conv-name-area {
            display: flex;
            align-items: center;
            gap: 5px;
            background: #e9ecef;
            padding: 3px 10px;
            border-radius: 20px;
        }
        .conv-name-display {
            font-size: 13px;
            font-weight: 500;
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .edit-name-btn {
            background: none;
            border: none;
            font-size: 14px;
            cursor: pointer;
            padding: 0 4px;
        }
        .action-bar {
            display: flex;
            gap: 8px;
            margin-left: auto;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 消息卡片 */
        .message {
            max-width: 85%;
            position: relative;
            animation: fadeIn 0.2s ease;
        }
        .user-message {
            align-self: flex-end;
        }
        .assistant-message {
            align-self: flex-start;
            width: 100%;
            max-width: 100%;
        }
        .message-bubble {
            padding: 10px 14px;
            border-radius: 18px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .user-message .message-bubble {
            background: #007aff;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .assistant-message .message-bubble {
            background: #e9ecef;
            color: #1a1a1a;
            border-bottom-left-radius: 4px;
        }
        /* Markdown 内容样式 */
        .message-bubble h1, .message-bubble h2, .message-bubble h3 {
            margin: 0.5em 0;
            font-weight: 600;
        }
        .message-bubble h1 { font-size: 1.4em; }
        .message-bubble h2 { font-size: 1.2em; }
        .message-bubble h3 { font-size: 1.1em; }
        .message-bubble p {
            margin: 0.4em 0;
        }
        .message-bubble ul, .message-bubble ol {
            padding-left: 1.5em;
            margin: 0.4em 0;
        }
        .message-bubble li {
            margin: 0.2em 0;
        }
        .message-bubble code {
            background: rgba(0,0,0,0.05);
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9em;
        }
        .message-bubble pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 8px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 0.5em 0;
        }
        .message-bubble pre code {
            background: transparent;
            padding: 0;
        }
        .message-bubble blockquote {
            border-left: 3px solid #aaa;
            margin: 0.5em 0;
            padding-left: 0.8em;
            color: #555;
        }
        .message-bubble a {
            color: #007aff;
            text-decoration: none;
        }
        .message-bubble a:hover {
            text-decoration: underline;
        }
        .message-time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 4px;
            text-align: right;
            padding-right: 8px;
        }
        .message-status {
            font-size: 10px;
            color: #6c757d;
            margin-top: 2px;
            text-align: right;
            padding-right: 8px;
            font-style: italic;
        }

        /* 流式输出中的临时消息 */
        .streaming-message {
            opacity: 0.9;
            transition: all 0.1s;
        }

        .message-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 4px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .message:hover .message-actions {
            opacity: 1;
        }
        .message-actions button {
            background: none;
            border: none;
            font-size: 12px;
            color: #6c757d;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 12px;
        }
        .edit-textarea {
            width: 100%;
            padding: 8px;
            border-radius: 12px;
            border: 1px solid #ccc;
            font-family: inherit;
            font-size: 14px;
            margin-bottom: 6px;
        }
        .edit-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }
        .edit-actions button {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 16px;
            border: none;
            cursor: pointer;
        }
        .edit-save {
            background: #007aff;
            color: white;
        }
        .edit-cancel {
            background: #e9ecef;
        }

        .abort-btn {
            background: #ff4d4f !important;
            color: white !important;
            padding: 4px 12px !important;
            border-radius: 20px !important;
        }

        .input-area {
            padding: 10px 12px;
            background: white;
            border-top: 1px solid #e5e5ea;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        #userInput {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #e5e5ea;
            border-radius: 24px;
            font-size: 15px;
            outline: none;
        }
        #sendBtn {
            background: #007aff;
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 550px) {
            .toolbar { flex-wrap: wrap; }
            .conv-name-area { order: 1; width: 100%; justify-content: center; }
            .toolbar select { order: 2; flex: 1; }
            .action-bar { order: 3; width: 100%; justify-content: space-around; }
            .message { max-width: 90%; }
            .assistant-message { max-width: 100%; }
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="api-key-bar">
        <input type="password" id="apiKeyInput" placeholder="DeepSeek API Key (sk-...)" autocomplete="off">
        <button id="saveApiKeyBtn">保存</button>
        <button id="clearApiKeyBtn" class="clear-key-btn">清除</button>
        <span id="apiStatus" class="api-status">⚙️ 未设置</span>
    </div>

    <div class="toolbar">
        <select id="conversationSelect"></select>
        <div class="conv-name-area">
            <span class="conv-name-display" id="convNameDisplay">新对话</span>
            <button id="editConvNameBtn" class="edit-name-btn" title="重命名会话">✏️</button>
        </div>
        <div class="action-bar">
            <button id="abortBtn" style="display:none;">⏹️ 中止</button>
            <button id="continueBtn">⏩ 继续生成</button>
            <button id="regenerateBtn">🔄 重新生成</button>
            <button id="newConversationBtn">➕新建</button>
            <button id="deleteConversationBtn">🗑️删除会话</button>
        </div>
    </div>

    <div class="chat-messages" id="chatMessages"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="输入你的问题..." autocomplete="off">
        <button id="sendBtn">➤</button>
    </div>
</div>

<script>
    // ==================== 配置 ====================
    let apiKey = localStorage.getItem('deepseek_api_key') || '';
    let conversations = {};      // { convId: { name, messages: [{id, role, content, timestamp}] } }
    let currentConvId = null;
    let isLoading = false;
    let abortController = null;   // 用于中止流式请求
    let currentStreamingMessageId = null; // 正在流式输出的消息ID

    function generateMsgId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 8); }
    function getCurrentTimestamp() { return new Date().toLocaleString(); }

    // ==================== API Key 管理 ====================
    function updateApiStatusUI() {
        const statusSpan = document.getElementById('apiStatus');
        const inputField = document.getElementById('apiKeyInput');
        if (apiKey && apiKey.startsWith('sk-')) {
            statusSpan.innerHTML = '✅ 密钥已设置';
            statusSpan.style.background = '#d4edda';
            if (inputField) inputField.value = '••••••••••••••••';
        } else {
            statusSpan.innerHTML = '⚠️ 未设置密钥';
            statusSpan.style.background = '#f8d7da';
            if (inputField) inputField.value = '';
        }
    }
    function saveApiKey(key) {
        if (key && key.trim().startsWith('sk-')) {
            apiKey = key.trim();
            localStorage.setItem('deepseek_api_key', apiKey);
            updateApiStatusUI();
            alert('API Key 已保存');
        } else { alert('无效的 API Key，需以 sk- 开头'); }
    }
    function clearApiKey() {
        if (confirm('清除 API Key？')) {
            apiKey = '';
            localStorage.removeItem('deepseek_api_key');
            updateApiStatusUI();
        }
    }

    // ==================== 会话存储 ====================
    function saveAllConversations() {
        const data = { conversations, currentId: currentConvId };
        localStorage.setItem('multi_conversations', JSON.stringify(data));
    }
    function loadAllConversations() {
        const saved = localStorage.getItem('multi_conversations');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                conversations = data.conversations || {};
                currentConvId = data.currentId || null;
                for (let id in conversations) {
                    if (!conversations[id].messages) conversations[id].messages = [];
                    conversations[id].messages.forEach(msg => { if (!msg.id) msg.id = generateMsgId(); });
                }
            } catch(e) { initDefaultConversation(); }
        } else { initDefaultConversation(); }
        if (!currentConvId || !conversations[currentConvId]) {
            const firstId = Object.keys(conversations)[0];
            if (firstId) currentConvId = firstId;
            else initDefaultConversation();
        }
    }
    function initDefaultConversation() {
        const defaultId = 'conv_' + Date.now();
        const welcomeMsg = { id: generateMsgId(), role: 'assistant', content: '你好！我是你的AI助手，有什么可以帮你的吗？', timestamp: getCurrentTimestamp() };
        conversations = { [defaultId]: { name: '新对话', messages: [welcomeMsg] } };
        currentConvId = defaultId;
        saveAllConversations();
    }

    // 渲染消息（支持 Markdown）
    function renderMessageElement(msg) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${msg.role === 'user' ? 'user-message' : 'assistant-message'}`;
        msgDiv.dataset.id = msg.id;
        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        if (msg.role === 'assistant') {
            // 使用 marked 解析 Markdown
            bubble.innerHTML = marked.parse(msg.content);
        } else {
            bubble.textContent = msg.content;
        }
        msgDiv.appendChild(bubble);
        const timeSpan = document.createElement('div');
        timeSpan.className = 'message-time';
        timeSpan.textContent = msg.timestamp;
        msgDiv.appendChild(timeSpan);
        // 状态区域（用于显示“正在回复中...”）
        const statusSpan = document.createElement('div');
        statusSpan.className = 'message-status';
        statusSpan.textContent = '';
        msgDiv.appendChild(statusSpan);
        // 操作按钮
        const actionsDiv = document.createElement('div');
        actionsDiv.className = 'message-actions';
        if (msg.role === 'user') {
            const editBtn = document.createElement('button');
            editBtn.textContent = '✏️ 编辑';
            editBtn.onclick = (e) => { e.stopPropagation(); editUserMessage(msg.id); };
            actionsDiv.appendChild(editBtn);
        }
        const delBtn = document.createElement('button');
        delBtn.textContent = '🗑️ 删除';
        delBtn.onclick = (e) => { e.stopPropagation(); deleteSingleMessage(msg.id); };
        actionsDiv.appendChild(delBtn);
        msgDiv.appendChild(actionsDiv);
        return msgDiv;
    }

    function renderCurrentMessages() {
        const chatDiv = document.getElementById('chatMessages');
        if (!chatDiv) return;
        const conv = conversations[currentConvId];
        if (!conv) return;
        chatDiv.innerHTML = '';
        conv.messages.forEach(msg => {
            chatDiv.appendChild(renderMessageElement(msg));
        });
        chatDiv.scrollTop = chatDiv.scrollHeight;
        updateConvNameDisplay();
    }

    // 更新单条消息的显示（用于流式输出时动态更新）
    function updateMessageContent(msgId, newContent, isStreaming = false) {
        const msgElement = document.querySelector(`.message[data-id="${msgId}"]`);
        if (!msgElement) return;
        const bubble = msgElement.querySelector('.message-bubble');
        if (bubble) {
            // 判断是否为 assistant 消息
            const isAssistant = msgElement.classList.contains('assistant-message');
            if (isAssistant) {
                bubble.innerHTML = marked.parse(newContent);
            } else {
                bubble.textContent = newContent;
            }
        }
        const statusSpan = msgElement.querySelector('.message-status');
        if (statusSpan) {
            if (isStreaming) {
                statusSpan.textContent = '正在回复中...';
            } else {
                statusSpan.textContent = '';
            }
        }
        const chatDiv = document.getElementById('chatMessages');
        chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    // 添加一条新消息（普通）
    function addMessageToCurrent(content, role, save = true) {
        const conv = conversations[currentConvId];
        if (!conv) return;
        const newMsg = { id: generateMsgId(), role, content, timestamp: getCurrentTimestamp() };
        conv.messages.push(newMsg);
        if (save) saveAllConversations();
        renderCurrentMessages();
        // 自动更新会话名称（如果有第一条用户消息）
        if (role === 'user' && conv.name === '新对话') {
            const newName = content.length > 20 ? content.slice(0,20)+'...' : content;
            conv.name = newName;
            saveAllConversations();
            updateConvNameDisplay();
            refreshConversationSelect();
        }
        return newMsg.id;
    }

    // 流式添加/更新消息：先创建一个空的 assistant 消息，然后逐字追加
    async function streamAssistantResponse(userMsgId) {
        const conv = conversations[currentConvId];
        // 创建一条临时的 assistant 消息（内容为空）
        const assistantMsgId = generateMsgId();
        const emptyMsg = { id: assistantMsgId, role: 'assistant', content: '', timestamp: getCurrentTimestamp() };
        conv.messages.push(emptyMsg);
        saveAllConversations();
        renderCurrentMessages();
        // 获取该消息的DOM元素，并添加流式状态
        const msgElement = document.querySelector(`.message[data-id="${assistantMsgId}"]`);
        if (msgElement) {
            const statusSpan = msgElement.querySelector('.message-status');
            if (statusSpan) statusSpan.textContent = '正在回复中...';
        }

        // 构建 API 请求的 messages（包含历史 + 刚添加的用户消息）
        const apiMessages = [{ role: 'system', content: '你是一个乐于助人的AI助手。' }];
        for (let msg of conv.messages) {
            if (msg.id === assistantMsgId) continue; // 跳过正在生成的空消息
            if (msg.role === 'user' || msg.role === 'assistant') {
                apiMessages.push({ role: msg.role, content: msg.content });
            }
        }

        abortController = new AbortController();
        const abortBtn = document.getElementById('abortBtn');
        abortBtn.style.display = 'inline-block';

        try {
            const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: apiMessages,
                    stream: true   // 开启流式
                }),
                signal: abortController.signal
            });

            if (!response.ok) {
                const errData = await response.json();
                throw new Error(`API 错误 (${response.status}): ${errData.error?.message || '未知'}`);
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullContent = '';
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop(); // 保留不完整的行
                for (const line of lines) {
                    const trimmed = line.trim();
                    if (!trimmed || trimmed === 'data: [DONE]') continue;
                    if (trimmed.startsWith('data: ')) {
                        try {
                            const jsonStr = trimmed.slice(6);
                            const data = JSON.parse(jsonStr);
                            const delta = data.choices[0]?.delta?.content;
                            if (delta) {
                                fullContent += delta;
                                // 更新显示
                                updateMessageContent(assistantMsgId, fullContent, true);
                            }
                        } catch(e) { /* 忽略解析错误 */ }
                    }
                }
            }
            // 流结束，更新最终内容
            if (fullContent) {
                const finalMsg = conv.messages.find(m => m.id === assistantMsgId);
                if (finalMsg) {
                    finalMsg.content = fullContent;
                    finalMsg.timestamp = getCurrentTimestamp();
                    saveAllConversations();
                    updateMessageContent(assistantMsgId, fullContent, false);
                }
            } else {
                // 没有收到任何内容，删除这条空消息
                conv.messages = conv.messages.filter(m => m.id !== assistantMsgId);
                saveAllConversations();
                renderCurrentMessages();
                addSystemMessage('AI 没有返回任何内容，请重试。');
            }
        } catch (err) {
            if (err.name === 'AbortError') {
                // 用户中止：删除未完成的空消息
                conv.messages = conv.messages.filter(m => m.id !== assistantMsgId);
                saveAllConversations();
                renderCurrentMessages();
                addSystemMessage('⏸️ 已中止生成');
            } else {
                console.error(err);
                // 出错时删除空消息并显示错误
                conv.messages = conv.messages.filter(m => m.id !== assistantMsgId);
                saveAllConversations();
                renderCurrentMessages();
                addSystemMessage(`❌ 错误：${err.message}`);
            }
        } finally {
            isLoading = false;
            abortController = null;
            abortBtn.style.display = 'none';
        }
    }

    // 发送用户消息并触发流式回复
    async function sendUserMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text || isLoading) return;
        if (!apiKey || !apiKey.startsWith('sk-')) {
            alert('请先设置有效的 API Key');
            return;
        }

        isLoading = true;
        // 添加用户消息
        const userMsgId = addMessageToCurrent(text, 'user', true);
        input.value = '';

        // 调用流式回复
        await streamAssistantResponse(userMsgId);
    }

    // 继续生成（基于已有对话，追加一条新的 AI 回复，流式）
    async function continueGeneration() {
        if (isLoading) { alert('正在生成中，请稍后'); return; }
        if (!apiKey || !apiKey.startsWith('sk-')) { alert('请先设置 API Key'); return; }
        isLoading = true;
        await streamAssistantResponse(null);
    }

    // 重新生成最后一条 AI 回复（删除最后一条 AI 回复后重新流式生成）
    async function regenerateLastAI() {
        if (isLoading) { alert('正在生成中，请稍后'); return; }
        const conv = conversations[currentConvId];
        const lastMsg = conv.messages[conv.messages.length - 1];
        if (lastMsg && lastMsg.role === 'assistant') {
            conv.messages.pop(); // 删除最后一条 AI 回复
            saveAllConversations();
            renderCurrentMessages();
            await continueGeneration(); // 重新生成
        } else {
            alert('没有可重新生成的 AI 回复');
        }
    }

    // 中止生成
    function abortGeneration() {
        if (abortController) {
            abortController.abort();
            abortController = null;
        }
    }

    // 添加系统临时消息（不保存）
    function addSystemMessage(content) {
        const chatDiv = document.getElementById('chatMessages');
        const tempDiv = document.createElement('div');
        tempDiv.className = 'message assistant-message';
        tempDiv.style.opacity = '0.7';
        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        bubble.textContent = content;
        tempDiv.appendChild(bubble);
        chatDiv.appendChild(tempDiv);
        chatDiv.scrollTop = chatDiv.scrollHeight;
        setTimeout(() => tempDiv.remove(), 3000);
    }

    // 编辑用户消息（保留原有逻辑，但需要重新生成后续回复）
    async function editUserMessage(msgId) {
        const conv = conversations[currentConvId];
        const msg = conv.messages.find(m => m.id === msgId);
        if (!msg || msg.role !== 'user') return;
        const msgElement = document.querySelector(`.message[data-id="${msgId}"]`);
        if (!msgElement) return;
        const originalContent = msg.content;
        msgElement.innerHTML = '';
        const textarea = document.createElement('textarea');
        textarea.value = originalContent;
        textarea.className = 'edit-textarea';
        textarea.rows = 2;
        const actionsDiv = document.createElement('div');
        actionsDiv.className = 'edit-actions';
        const saveBtn = document.createElement('button');
        saveBtn.textContent = '保存并重新生成';
        saveBtn.className = 'edit-save';
        const cancelBtn = document.createElement('button');
        cancelBtn.textContent = '取消';
        cancelBtn.className = 'edit-cancel';
        actionsDiv.appendChild(saveBtn);
        actionsDiv.appendChild(cancelBtn);
        msgElement.appendChild(textarea);
        msgElement.appendChild(actionsDiv);

        saveBtn.onclick = async () => {
            const newContent = textarea.value.trim();
            if (!newContent) { alert('消息不能为空'); return; }
            msg.content = newContent;
            msg.timestamp = getCurrentTimestamp();
            // 删除该消息之后的所有消息
            const msgIndex = conv.messages.findIndex(m => m.id === msgId);
            conv.messages = conv.messages.slice(0, msgIndex + 1);
            saveAllConversations();
            renderCurrentMessages();
            // 重新生成 AI 回复
            await continueGeneration();
        };
        cancelBtn.onclick = () => { renderCurrentMessages(); };
    }

    function deleteSingleMessage(msgId) {
        if (confirm('删除这条消息及其之后的所有对话？')) {
            const conv = conversations[currentConvId];
            const idx = conv.messages.findIndex(m => m.id === msgId);
            if (idx !== -1) {
                conv.messages = conv.messages.slice(0, idx);
                saveAllConversations();
                renderCurrentMessages();
            }
        }
    }

    // ==================== 会话管理UI ====================
    function refreshConversationSelect() {
        const select = document.getElementById('conversationSelect');
        select.innerHTML = '';
        for (let id in conversations) {
            const option = document.createElement('option');
            option.value = id;
            option.textContent = conversations[id].name || '未命名';
            if (id === currentConvId) option.selected = true;
            select.appendChild(option);
        }
    }
    function updateConvNameDisplay() {
        const display = document.getElementById('convNameDisplay');
        if (display && conversations[currentConvId]) {
            display.textContent = conversations[currentConvId].name || '未命名';
        }
    }
    function switchConversation(convId) {
        if (!conversations[convId]) return;
        if (isLoading) { alert('请等待当前对话完成'); return; }
        currentConvId = convId;
        renderCurrentMessages();
        refreshConversationSelect();
        saveAllConversations();
    }
    function newConversation() {
        if (isLoading) { alert('请等待当前对话完成'); return; }
        const newId = 'conv_' + Date.now();
        const welcome = { id: generateMsgId(), role: 'assistant', content: '你好！新会话已创建。', timestamp: getCurrentTimestamp() };
        conversations[newId] = { name: '新对话', messages: [welcome] };
        currentConvId = newId;
        renderCurrentMessages();
        refreshConversationSelect();
        saveAllConversations();
    }
    function deleteCurrentConversation() {
        if (isLoading) { alert('请等待当前对话完成'); return; }
        const ids = Object.keys(conversations);
        if (ids.length === 1) { alert('至少保留一个会话'); return; }
        if (confirm(`删除会话“${conversations[currentConvId].name}”?`)) {
            delete conversations[currentConvId];
            currentConvId = Object.keys(conversations)[0];
            renderCurrentMessages();
            refreshConversationSelect();
            saveAllConversations();
        }
    }
    function editConversationName() {
        const newName = prompt('输入新的会话名称', conversations[currentConvId].name);
        if (newName && newName.trim()) {
            conversations[currentConvId].name = newName.trim();
            saveAllConversations();
            updateConvNameDisplay();
            refreshConversationSelect();
        }
    }

    // ==================== 初始化 ====================
    document.addEventListener('DOMContentLoaded', () => {
        const storedKey = localStorage.getItem('deepseek_api_key');
        if (storedKey) apiKey = storedKey;
        updateApiStatusUI();
        loadAllConversations();
        renderCurrentMessages();
        refreshConversationSelect();
        updateConvNameDisplay();

        document.getElementById('saveApiKeyBtn').onclick = () => {
            const newKey = document.getElementById('apiKeyInput').value;
            if (newKey) saveApiKey(newKey);
            else alert('请输入 API Key');
        };
        document.getElementById('clearApiKeyBtn').onclick = clearApiKey;
        document.getElementById('conversationSelect').onchange = (e) => switchConversation(e.target.value);
        document.getElementById('newConversationBtn').onclick = newConversation;
        document.getElementById('deleteConversationBtn').onclick = deleteCurrentConversation;
        document.getElementById('editConvNameBtn').onclick = editConversationName;
        document.getElementById('abortBtn').onclick = abortGeneration;
        document.getElementById('continueBtn').onclick = continueGeneration;
        document.getElementById('regenerateBtn').onclick = regenerateLastAI;
        document.getElementById('sendBtn').onclick = sendUserMessage;
        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendUserMessage(); }
        });
    });
</script>
</body>
</html>
